kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: apache-manager-rolebinding
  namespace: apache

subjects:  #kya kya log involved hai
- kind: User
  name: apache-user
  apiGroup: rbac.authorization.k8s.io
roleRef:  #apache user ko kon sa role dena chahte ho
  kind: Role
  name: apache-manager
  apiGroup: rbac.authorization.k8s.io
